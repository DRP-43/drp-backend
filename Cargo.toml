[package]
    edition = "2024"
    name    = "drp-backend"
    version = "0.1.0"

[dependencies]
    anyhow             = "^1.0.102"
    axum               = "^0.8.9"
    diesel             = { version = "^2.3.9", features = ["postgres"] }
    dotenvy            = "^0.15.7"
    tokio              = { version = "^1.52.3", features = ["full"] }
    tracing            = "^0.1.44"
    tracing-subscriber = "^0.3.23"

[lib]
    name = "drp_backend"
    path = "src/lib.rs"

[[bin]]
    name = "app"
    path = "src/bin/app/main.rs"
